<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - zedong254ke Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Modern Color Palette with Enhanced Accessibility */
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: #e0e7ff;
            --primary-dark: #4338ca;
            --accent-color: #06b6d4;
            --accent-hover: #0891b2;
            --accent-light: #cffafe;
            --accent-dark: #0e7490;

            /* Background Colors */
            --bg-color: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
            --bg-gradient-subtle: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.8) 100%);

            /* Card and Surface Colors */
            --card-bg: #ffffff;
            --card-bg-hover: #fafbfc;
            --surface-bg: #f8fafc;
            --surface-border: #e2e8f0;

            /* Text Colors with High Contrast */
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --text-inverse: #ffffff;

            /* Border Colors */
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;
            --border-medium: #cbd5e1;
            --border-dark: #94a3b8;

            /* Shadow System */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.15);
            --shadow-glow-accent: 0 0 20px rgba(6, 182, 212, 0.15);

            /* Border Radius System */
            --border-radius: 16px;
            --border-radius-sm: 8px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;

            /* Transition System */
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);

            /* Typography System */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-family-heading: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-family-mono: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;

            /* Font Sizes */
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1.125rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 1.5rem;
            --font-size-2xl: 1.75rem;
            --font-size-3xl: 2rem;
            --font-size-4xl: 2.5rem;
            --font-size-5xl: 3.5rem;

            /* Font Weights */
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            --font-weight-extrabold: 800;

            /* Line Heights */
            --line-height-tight: 1.25;
            --line-height-snug: 1.375;
            --line-height-normal: 1.6;
            --line-height-relaxed: 1.625;
            --line-height-loose: 2;

            /* Spacing Scale */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
            --space-20: 5rem;
            --space-24: 6rem;

            /* Z-Index Scale */
            --z-dropdown: 1000;
            --z-sticky: 1020;
            --z-fixed: 1030;
            --z-modal-backdrop: 1040;
            --z-modal: 1050;
            --z-popover: 1060;
            --z-tooltip: 1070;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header Styles */
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: white;
        }

        .logo img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .logo .logo-title {
            font-size: 24px;
            font-weight: 600;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 8px;
        }

        nav a:hover,
        nav a:focus-visible {
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        /* Active Tab Highlighting */
        nav a.active-tab {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            font-weight: 600;
        }

        .admin-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: var(--transition);
            margin-left: 16px;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Main Content */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .about-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .about-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #F6B8A9 100%);
            color: white;
            padding: 60px 32px;
            text-align: center;
        }

        .about-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 2;
            color: #ffffff;
        }

        .about-header p {
            font-size: 1.375rem;
            opacity: 0.95;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.7;
            font-weight: 400;
            position: relative;
            z-index: 2;
            color: rgba(255, 255, 255, 0.95);
        }

        .about-content {
            padding: 48px 32px;
        }

        .about-section {
            margin-bottom: 48px;
        }

        .about-section h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .about-section p {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .skill-card {
            background: var(--bg-secondary);
            padding: 32px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-color) 0%, var(--accent-color) 100%);
            transition: width var(--transition);
        }

        .skill-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-color);
        }

        .skill-card:hover::before {
            width: 6px;
        }

        .skill-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .skill-card p {
            color: var(--text-medium);
            line-height: 1.6;
        }

        .contact-info {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(99, 102, 241, 0.05) 100%);
            padding: 40px;
            border-radius: var(--border-radius);
            margin-top: 32px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .contact-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-color) 0%, var(--accent-color) 100%);
        }

        .contact-info h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .contact-item i {
            font-size: 1.5rem;
            color: var(--primary-color);
            width: 24px;
        }

        .contact-item a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .contact-item a:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-container {
                padding: 0 16px;
            }

            .logo .logo-title {
                font-size: 20px;
            }

            nav {
                gap: 16px;
            }

            nav a span {
                display: none;
            }

            main {
                padding: 24px 16px;
            }

            .about-header {
                padding: 40px 24px;
            }

            .about-header h1 {
                font-size: 2.5rem;
            }

            .about-content {
                padding: 32px 24px;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Micro-interactions */
        .about-header h1 {
            animation: fadeInUp 1s ease-out;
        }

        .about-header p {
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .about-section {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .about-section:nth-child(1) {
            animation-delay: 0.3s;
        }

        .about-section:nth-child(2) {
            animation-delay: 0.5s;
        }

        .about-section:nth-child(3) {
            animation-delay: 0.7s;
        }

        .skill-card {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .skill-card:nth-child(1) {
            animation-delay: 0.8s;
        }

        .skill-card:nth-child(2) {
            animation-delay: 0.9s;
        }

        .skill-card:nth-child(3) {
            animation-delay: 1.0s;
        }

        .skill-card:nth-child(4) {
            animation-delay: 1.1s;
        }

        .contact-info {
            animation: fadeInUp 0.8s ease-out 1.2s both;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading skeleton animation */
        .loading-skeleton {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Enhanced hover effects */
        .skill-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .contact-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .contact-item:hover {
            transform: translateX(8px);
        }

        .contact-item a:hover {
            color: var(--accent-hover);
        }

        /* Navigation hover effects */
        nav a {
            position: relative;
            overflow: hidden;
        }

        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        nav a:hover::before {
            left: 100%;
        }

        /* Logo hover effect */
        .logo:hover {
            transform: scale(1.05);
        }

        .logo img:hover {
            transform: rotate(5deg) scale(1.1);
        }
    </style>
</head>

<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=zedong" alt="Profile picture">
                <span class="logo-title">zedong254ke</span>
            </a>
            <nav>
                <a href="/"><span>Home</span>🏠</a>
                <a href="/"><span>Blog</span>📝</a>
                <a href="/about.html" class="active-tab"><span>About</span>ℹ️</a>
                <button class="admin-btn" onclick="openAdminModal()">🔒 Admin</button>
            </nav>
        </div>
    </header>

    <main>
        <div class="about-container">
            <div class="about-header hero-section">
                <h1 id="about-hero-title">About Me</h1>
                <p id="about-hero-subtitle">Passionate developer sharing knowledge through code and creativity</p>
            </div>

            <div class="about-content">
                <section class="about-section" id="section-who-i-am">
                    <h2>Who I Am</h2>
                    <div class="section-content">
                        <!-- Content will be loaded here -->
                    </div>
                </section>

                <section class="about-section" id="section-what-i-do">
                    <h2>What I Do</h2>
                    <div class="section-content">
                        <!-- Content will be loaded here -->
                    </div>

                    <div class="skills-grid" id="about-skills-grid">
                        <!-- Skills will be loaded here -->
                    </div>
                </section>

                <section class="about-section" id="section-mission">
                    <h2>My Mission</h2>
                    <div class="section-content">
                        <!-- Content will be loaded here -->
                    </div>
                    <ul id="mission-points" style="margin-left: 20px; margin-top: 16px;">
                        <!-- Points will be loaded here -->
                    </ul>
                </section>

                <div class="contact-info contact-section">
                    <h3>Get In Touch</h3>
                    <div class="contact-grid">
                        <div class="contact-item" id="contact-email-wrapper">
                            <i>📧</i>
                            <a href="#" id="contact-email">Email</a>
                        </div>
                        <div class="contact-item" id="contact-twitter-wrapper">
                            <i>🐦</i>
                            <a href="#" id="contact-twitter" target="_blank">Twitter</a>
                        </div>
                        <div class="contact-item" id="contact-linkedin-wrapper">
                            <i>💼</i>
                            <a href="#" id="contact-linkedin" target="_blank">LinkedIn</a>
                        </div>
                        <div class="contact-item" id="contact-github-wrapper">
                            <i>📖</i>
                            <a href="#" id="contact-github" target="_blank">GitHub</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Admin Modal Functions (same as index.html)
        function openAdminModal() {
            // For now, redirect to login page
            window.location.href = '/login.html';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            // Modal functionality can be added later if needed
        }

        // Load blog info
        fetch('/api/settings/blog-info')
            .then(response => response.json())
            .then(data => {
                if (data.blogInfo && data.blogInfo.title) {
                    document.querySelector('.logo .logo-title').textContent = data.blogInfo.title;
                    document.title = `About - ${data.blogInfo.title}`;
                }
            })
            .catch(error => console.error('Error loading blog info:', error));

        // Active Tab Highlighting Function
        function highlightActiveTab() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('nav a');

            navLinks.forEach(link => {
                const href = link.getAttribute('href');

                link.classList.remove('active');
                link.classList.remove('active-tab');

                if (href === '/' && (currentPath === '/' || currentPath === '/index.html')) {
                    if (link.textContent.includes('Home')) {
                        link.classList.add('active', 'active-tab');
                    }
                } else if (href && href !== '/' && currentPath.includes(href.replace('/', '').replace('.html', ''))) {
                    link.classList.add('active', 'active-tab');
                }
            });
        }
        document.addEventListener('DOMContentLoaded', highlightActiveTab);

        // Load About content
        async function loadAboutContent() {
            try {
                const response = await fetch('/api/about');
                const about = await response.json();

                if (about) {
                    // Update Hero
                    if (about.hero) {
                        document.getElementById('about-hero-title').textContent = about.hero.title || 'About Me';
                        document.getElementById('about-hero-subtitle').textContent = about.hero.subtitle || '';
                    }

                    // Update Sections
                    if (about.sections) {
                        about.sections.forEach(sec => {
                            const sectionEl = document.getElementById(`section-${sec.id}`);
                            if (sectionEl) {
                                const contentEl = sectionEl.querySelector('.section-content');
                                if (contentEl) {
                                    contentEl.innerHTML = sec.content ? sec.content.split('\n\n').map(p => `<p>${p}</p>`).join('') : '';
                                }

                                if (sec.id === 'mission' && sec.points) {
                                    const pointsEl = document.getElementById('mission-points');
                                    if (pointsEl) {
                                        pointsEl.innerHTML = sec.points.map(p => `<li style="margin-bottom: 8px;">${p}</li>`).join('');
                                    }
                                }
                            }
                        });
                    }

                    // Update Skills
                    if (about.skills) {
                        const skillsGrid = document.getElementById('about-skills-grid');
                        if (skillsGrid) {
                            skillsGrid.innerHTML = about.skills.map(skill => `
                                <div class="skill-card">
                                    <h3>${skill.title}</h3>
                                    <p>${skill.description}</p>
                                </div>
                            `).join('');
                        }
                    }

                    // Update Contact
                    if (about.contact) {
                        const contactMap = {
                            email: { id: 'contact-email', template: (v) => `mailto:${v}` },
                            twitter: { id: 'contact-twitter' },
                            linkedin: { id: 'contact-linkedin' },
                            github: { id: 'contact-github' }
                        };

                        Object.entries(contactMap).forEach(([key, cfg]) => {
                            const val = about.contact[key];
                            const link = document.getElementById(cfg.id);
                            if (val && link) {
                                link.href = cfg.template ? cfg.template(val) : val;
                                link.textContent = key === 'email' ? val : key.charAt(0).toUpperCase() + key.slice(1);
                                document.getElementById(`${cfg.id}-wrapper`).style.display = 'flex';
                            } else if (link) {
                                document.getElementById(`${cfg.id}-wrapper`).style.display = 'none';
                            }
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading about content:', error);
            }
        }
        document.addEventListener('DOMContentLoaded', loadAboutContent);
    </script>
</body>

</html>
