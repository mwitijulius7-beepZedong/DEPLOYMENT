<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - React + Tailwind</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/lucide-react@0.263.1/umd/lucide-react.development.js"></script>
    <style>
        .bg-primary { background-color: #F4A191; }
        .text-primary { color: #F4A191; }
        .border-primary { border-color: #F4A191; }
        .bg-primary\/10 { background-color: rgba(244, 161, 145, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { HashRouter, Routes, Route, NavLink } = ReactRouterDOM;
        const {
            LayoutDashboard,
            FileText,
            Users,
            Tag,
            BarChart3,
            Settings,
            LogOut,
            TrendingUp,
            Eye,
            UserCheck
        } = LucideReact;

        // SidebarItem Component
        function SidebarItem({ to, icon: Icon, label }) {
            return (
                <NavLink
                    to={to}
                    className={({ isActive }) =>
                        `flex items-center gap-3 px-4 py-2 rounded-lg text-sm
                         transition cursor-pointer
                         ${isActive
                           ? "bg-primary/10 text-primary font-medium"
                           : "text-gray-600 hover:bg-gray-100"}`
                    }
                >
                    <Icon className="w-4 h-4" />
                    <span>{label}</span>
                </NavLink>
            );
        }

        // Sidebar Component
        function Sidebar() {
            const navigation = [
                { to: "/", icon: LayoutDashboard, label: "Dashboard" },
                { to: "/posts", icon: FileText, label: "Posts" },
                { to: "/users", icon: Users, label: "Users" },
                { to: "/categories", icon: Tag, label: "Categories" },
                { to: "/analytics", icon: BarChart3, label: "Analytics" },
                { to: "/settings", icon: Settings, label: "Settings" },
            ];

            return (
                <div className="w-60 bg-white border-r border-gray-200 flex flex-col">
                    {/* Header */}
                    <div className="p-6 border-b border-gray-200">
                        <h1 className="text-xl font-bold text-gray-900">Admin Panel</h1>
                        <p className="text-sm text-gray-600">Blog Management</p>
                    </div>

                    {/* Navigation */}
                    <nav className="flex-1 p-4">
                        <div className="space-y-1">
                            {navigation.map((item) => (
                                <SidebarItem
                                    key={item.to}
                                    to={item.to}
                                    icon={item.icon}
                                    label={item.label}
                                />
                            ))}
                        </div>
                    </nav>

                    {/* Footer */}
                    <div className="p-4 border-t border-gray-200">
                        <button className="flex items-center gap-3 px-4 py-2 w-full text-left text-gray-600 hover:bg-gray-100 rounded-lg transition cursor-pointer">
                            <LogOut className="w-4 h-4" />
                            <span>Logout</span>
                        </button>
                    </div>
                </div>
            );
        }

        // AdminLayout Component
        function AdminLayout({ children }) {
            return (
                <div className="flex bg-gray-50 min-h-screen">
                    <Sidebar />
                    <main className="flex-1 p-6 overflow-y-auto">
                        {children}
                    </main>
                </div>
            );
        }

        // Dashboard Component
        function Dashboard() {
            const stats = [
                { label: "Total Posts", value: "24", icon: FileText, color: "text-blue-600" },
                { label: "Total Views", value: "1,429", icon: Eye, color: "text-green-600" },
                { label: "Active Users", value: "89", icon: UserCheck, color: "text-purple-600" },
                { label: "Growth", value: "+12%", icon: TrendingUp, color: "text-orange-600" },
            ];

            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-3xl font-bold text-gray-900">Dashboard</h1>
                        <p className="text-gray-600">Welcome to your admin panel</p>
                    </div>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {stats.map((stat, index) => (
                            <div key={index} className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-gray-600">{stat.label}</p>
                                        <p className="text-2xl font-bold text-gray-900">{stat.value}</p>
                                    </div>
                                    <stat.icon className={`w-8 h-8 ${stat.color}`} />
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Recent Activity */}
                    <div className="bg-white rounded-lg shadow-sm border border-gray-200">
                        <div className="p-6 border-b border-gray-200">
                            <h2 className="text-lg font-semibold text-gray-900">Recent Activity</h2>
                        </div>
                        <div className="p-6">
                            <div className="space-y-4">
                                <div className="flex items-center gap-4">
                                    <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                    <div className="flex-1">
                                        <p className="text-sm font-medium text-gray-900">New post published</p>
                                        <p className="text-xs text-gray-600">2 hours ago</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="w-2 h-2 bg-blue-500 rounded-full"></div>
                                    <div className="flex-1">
                                        <p className="text-sm font-medium text-gray-900">User registered</p>
                                        <p className="text-xs text-gray-600">4 hours ago</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="w-2 h-2 bg-orange-500 rounded-full"></div>
                                    <div className="flex-1">
                                        <p className="text-sm font-medium text-gray-900">Comment received</p>
                                        <p className="text-xs text-gray-600">6 hours ago</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Posts Component
        function Posts() {
            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-3xl font-bold text-gray-900">Posts</h1>
                        <p className="text-gray-600">Manage your blog posts</p>
                    </div>

                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-semibold text-gray-900">All Posts</h2>
                            <button className="bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition">
                                New Post
                            </button>
                        </div>

                        <div className="space-y-4">
                            {[1, 2, 3].map((post) => (
                                <div key={post} className="flex items-center justify-between p-4 border border-gray-200 rounded-lg">
                                    <div>
                                        <h3 className="font-medium text-gray-900">Sample Post {post}</h3>
                                        <p className="text-sm text-gray-600">Published 2 days ago</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button className="text-blue-600 hover:text-blue-800">Edit</button>
                                        <button className="text-red-600 hover:text-red-800">Delete</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            return (
                <HashRouter>
                    <AdminLayout>
                        <Routes>
                            <Route path="/" element={<Dashboard />} />
                            <Route path="/posts" element={<Posts />} />
                            <Route path="/users" element={<div className="p-6"><h1 className="text-2xl font-bold">Users</h1><p>Manage user accounts</p></div>} />
                            <Route path="/categories" element={<div className="p-6"><h1 className="text-2xl font-bold">Categories</h1><p>Manage post categories</p></div>} />
                            <Route path="/analytics" element={<div className="p-6"><h1 className="text-2xl font-bold">Analytics</h1><p>View detailed analytics</p></div>} />
                            <Route path="/settings" element={<div className="p-6"><h1 className="text-2xl font-bold">Settings</h1><p>Configure your blog</p></div>} />
                        </Routes>
                    </AdminLayout>
                </HashRouter>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
