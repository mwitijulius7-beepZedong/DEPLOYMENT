<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test New Settings APIs</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .json-output { background: #f8f9fa; padding: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input { padding: 5px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <h1>Test New Settings APIs</h1>
    <p>Server should be running on http://localhost:3000</p>

    <div class="test-section">
        <h3>1. Test GET /api/settings/notifications</h3>
        <button onclick="testGetNotifications()">Get Notifications Settings</button>
        <div id="notifications-result"></div>
    </div>

    <div class="test-section">
        <h3>2. Test GET /api/settings/content</h3>
        <button onclick="testGetContent()">Get Content Settings</button>
        <div id="content-result"></div>
    </div>

    <div class="test-section">
        <h3>3. Login as Admin (required for POST tests)</h3>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="Mwitijulius7@Jm">
        <button onclick="login()">Login</button>
        <div id="login-result"></div>
    </div>

    <div class="test-section">
        <h3>4. Test POST /api/settings/notifications</h3>
        <div>
            <label><input type="checkbox" id="emailNotif" checked> Email Notifications</label>
            <label><input type="checkbox" id="commentNotif" checked> Comment Notifications</label>
            <label><input type="checkbox" id="subNotif" checked> Subscription Notifications</label>
        </div>
        <input type="email" id="adminEmail" placeholder="Admin Email" value="admin@example.com">
        <button onclick="testPostNotifications()">Update Notifications</button>
        <div id="post-notifications-result"></div>
    </div>

    <div class="test-section">
        <h3>5. Test POST /api/settings/content</h3>
        <div>
            <label><input type="checkbox" id="enableComments" checked> Enable Comments</label>
            <label><input type="checkbox" id="enableSubs" checked> Enable Subscriptions</label>
            <label><input type="checkbox" id="enableRTE" checked> Enable Rich Text Editor</label>
        </div>
        <input type="number" id="postsPerPage" placeholder="Posts per page" value="10" min="1" max="50">
        <input type="number" id="featuredCount" placeholder="Featured posts count" value="3" min="0" max="10">
        <button onclick="testPostContent()">Update Content Settings</button>
        <div id="post-content-result"></div>
    </div>

    <script>
        let authToken = '';

        function showResult(elementId, result, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.className = isSuccess ? 'success' : 'error';
            element.innerHTML = `<div class="json-output">${JSON.stringify(result, null, 2)}</div>`;
        }

        async function makeRequest(url, options = {}) {
            try {
                const response = await fetch(url, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });

                const data = await response.json();
                return { ok: response.ok, status: response.status, data };
            } catch (error) {
                return { ok: false, error: error.message };
            }
        }

        async function testGetNotifications() {
            const result = await makeRequest('/api/settings/notifications');
            showResult('notifications-result', result, result.ok);
        }

        async function testGetContent() {
            const result = await makeRequest('/api/settings/content');
            showResult('content-result', result, result.ok);
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const result = await makeRequest('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });

            if (result.ok && result.data.token) {
                authToken = result.data.token;
                showResult('login-result', { message: 'Login successful', token: authToken.substring(0, 20) + '...' }, true);
            } else {
                showResult('login-result', result, false);
            }
        }

        async function testPostNotifications() {
            if (!authToken) {
                showResult('post-notifications-result', { error: 'Please login first' }, false);
                return;
            }

            const data = {
                emailNotifications: document.getElementById('emailNotif').checked,
                commentNotifications: document.getElementById('commentNotif').checked,
                subscriptionNotifications: document.getElementById('subNotif').checked,
                adminEmail: document.getElementById('adminEmail').value
            };

            const result = await makeRequest('/api/settings/notifications', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${authToken}` },
                body: JSON.stringify(data)
            });

            showResult('post-notifications-result', result, result.ok);
        }

        async function testPostContent() {
            if (!authToken) {
                showResult('post-content-result', { error: 'Please login first' }, false);
                return;
            }

            const data = {
                enableComments: document.getElementById('enableComments').checked,
                enableSubscriptions: document.getElementById('enableSubs').checked,
                postsPerPage: parseInt(document.getElementById('postsPerPage').value),
                featuredPostsCount: parseInt(document.getElementById('featuredCount').value),
                enableRichTextEditor: document.getElementById('enableRTE').checked
            };

            const result = await makeRequest('/api/settings/content', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${authToken}` },
                body: JSON.stringify(data)
            });

            showResult('post-content-result', result, result.ok);
        }
    </script>
</body>
</html>
