<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blog Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-medium: #64748b;
            --error-color: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --border-radius: 16px;
            --transition: all 0.2s ease-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 380px;
            transform: translateY(0);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .login-header p {
            color: var(--text-medium);
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .forgot-password {
            text-align: center;
            margin-top: 16px;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-medium);
            transition: var(--transition);
            padding: 4px;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--text-dark);
        }

        .form-label {
            position: absolute;
            left: 16px;
            top: 16px;
            color: var(--text-medium);
            font-size: 15px;
            pointer-events: none;
            transition: var(--transition);
            background: transparent;
            padding: 0 4px;
        }

        .form-input {
            padding: 24px 16px 8px;
            height: 56px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: var(--transition);
            background: #f8fafc;
            width: 100%;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: #ffffff;
        }

        .form-input:focus~.form-label,
        .form-input:not(:placeholder-shown)~.form-label {
            transform: translateY(-10px) scale(0.85);
            transform-origin: left top;
            color: var(--primary-color);
        }

        .login-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 24px;
            height: 52px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .login-btn:disabled {
            background: var(--text-medium);
            cursor: not-allowed;
            transform: none;
        }

        .google-btn {
            background: #ffffff;
            color: var(--text-dark);
            border: 1px solid #e2e8f0;
            padding: 0 24px;
            height: 52px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .google-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
            color: var(--text-medium);
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 0;
            background: #e9ecef;
            border-top: 1px solid #e2e8f0;
        }

        .divider span {
            background: var(--card-bg);
            padding: 0 16px;
            font-size: 13px;
        }

        .error-message {
            background: #fef2f2;
            color: var(--error-color);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #fee2e2;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: var(--text-medium);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

        .back-link a:hover {
            color: var(--primary-color);
        }

        .forgot-password-form {
            display: none;
            margin-top: 20px;
        }

        .forgot-password-form .form-group {
            margin-bottom: 16px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px;
            }
        }

        /* Admin Entry Key Gate (blocks access to login page) */
        .admin-key-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(10px);
            z-index: 9999;
            padding: 20px;
        }

        .admin-key-card {
            width: 100%;
            max-width: 360px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            padding: 20px;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }

        .admin-key-card h2 {
            margin: 0 0 8px;
            font-size: 16px;
            color: var(--text-dark);
            letter-spacing: -0.02em;
        }

        .admin-key-card p {
            margin: 0 0 18px;
            color: var(--text-medium);
            font-size: 12.5px;
        }

        .admin-key-error {
            display: none;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: var(--error-color);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .admin-key-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .admin-key-help {
            font-size: 12px;
            color: var(--text-medium);
            margin-top: 8px;
            line-height: 1.3;
        }

        .admin-key-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .admin-key-input-wrap {
            position: relative;
            width: 100%;
        }

        .admin-key-input {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: #f8fafc;
        }

        .admin-key-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
            background: #ffffff;
        }

        .admin-key-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #ffffff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-medium);
            transition: var(--transition);
        }

        .admin-key-toggle:hover {
            color: var(--text-dark);
            border-color: #cbd5e1;
        }

        .admin-key-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .admin-key-actions button {
            flex: 1;
        }
    </style>
</head>

<body>
    <!-- Admin Entry Key Gate -->
    <div class="admin-key-overlay" id="adminKeyOverlay" aria-hidden="true">
        <div class="admin-key-card" role="dialog" aria-modal="true" aria-labelledby="adminKeyTitle">
            <h2 id="adminKeyTitle">Subscriber ID Required</h2>
            
            <div class="admin-key-error" id="adminKeyError"></div>

            <div class="admin-key-field">
                <div class="admin-key-label" id="adminKeyLabel">Subscriber ID</div>
                <div class="admin-key-input-wrap">
                    <input class="admin-key-input" id="adminKeyInput" type="password" placeholder="Enter subscriber ID"
                        autocomplete="off" maxlength="200" aria-labelledby="adminKeyLabel" />
                    <button class="admin-key-toggle" id="adminKeyToggle" type="button" aria-label="Show subscriber ID"
                        title="Show/Hide">
                        <svg id="adminKeyToggleIcon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="admin-key-actions">
                <button class="login-btn" id="adminKeyUnlockBtn" type="button">Unlock</button>
                <button class="google-btn" id="adminKeyCancelBtn" type="button">Cancel</button>
            </div>
        </div>
    </div>

    <div class="login-container" id="loginContainer" style="display:none;">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Sign in to access the admin panel</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <input type="text" id="username" class="form-input" placeholder=" " required autocomplete="username"
                    maxlength="100">
                <label for="username" class="form-label">Username</label>
            </div>

            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder=" " required
                    autocomplete="current-password" maxlength="200" style="padding-right: 48px;">
                <label for="password" class="form-label">Password</label>
                <button type="button" class="password-toggle" id="passwordToggle"
                    aria-label="Toggle password visibility">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span>Sign In</span>
            </button>
        </form>

        <div class="forgot-password" id="forgotPasswordContainer">
            <a href="#" id="forgotPasswordLink">Forgot your password?</a>
        </div>

        <form class="forgot-password-form" id="forgotPasswordForm">
            <div class="form-group">
                <input type="email" id="resetEmail" class="form-input" placeholder=" " required autocomplete="email">
                <label for="resetEmail" class="form-label">Email Address</label>
            </div>
            <button type="submit" class="login-btn" id="resetBtn">Send Reset Email</button>
            <div class="forgot-password" style="margin-top: 12px;">
                <a href="#" id="backToLoginLink">← Back to Login</a>
            </div>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <button class="google-btn" id="googleBtn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="currentColor"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="currentColor"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="currentColor"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Sign in with Google
        </button>

        <div class="back-link">
            <a href="/">← Back to Blog</a>
        </div>
    </div>

    <script>
        // ------------------------------------------------------------
        // Admin Entry Key gate (runs BEFORE showing the login UI)
        // ------------------------------------------------------------
        const loginContainerEl = document.getElementById('loginContainer');
        const adminKeyOverlayEl = document.getElementById('adminKeyOverlay');
        const adminKeyInputEl = document.getElementById('adminKeyInput');
        const adminKeyUnlockBtn = document.getElementById('adminKeyUnlockBtn');
        const adminKeyCancelBtn = document.getElementById('adminKeyCancelBtn');
        const adminKeyErrorEl = document.getElementById('adminKeyError');
        const adminKeyToggleBtn = document.getElementById('adminKeyToggle');
        const adminKeyToggleIcon = document.getElementById('adminKeyToggleIcon');

        function showAdminKeyError(message) {
            if (!adminKeyErrorEl) return;
            adminKeyErrorEl.textContent = message;
            adminKeyErrorEl.style.display = 'block';
        }

        function clearAdminKeyError() {
            if (!adminKeyErrorEl) return;
            adminKeyErrorEl.textContent = '';
            adminKeyErrorEl.style.display = 'none';
        }

        function showLoginUI() {
            if (loginContainerEl) loginContainerEl.style.display = 'block';
            if (adminKeyOverlayEl) {
                adminKeyOverlayEl.style.display = 'none';
                adminKeyOverlayEl.setAttribute('aria-hidden', 'true');
            }
        }

        function showAdminKeyOverlay() {
            if (!adminKeyOverlayEl) return;
            adminKeyOverlayEl.style.display = 'flex';
            adminKeyOverlayEl.setAttribute('aria-hidden', 'false');
            setTimeout(() => adminKeyInputEl && adminKeyInputEl.focus(), 0);
        }

        async function verifyAdminEntryKeyFromOverlay() {
            clearAdminKeyError();
            const key = (adminKeyInputEl && adminKeyInputEl.value) ? adminKeyInputEl.value.trim() : '';
            if (!key) {
                showAdminKeyError('Subscriber ID is required.');
                return;
            }

            adminKeyUnlockBtn.disabled = true;
            adminKeyUnlockBtn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
                const res = await fetch('/api/settings/verify-entry-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ adminEntryKey: key })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok && data && data.success) {
                    // Store keyToken for login request (serverless-compatible)
                    if (data.keyToken) {
                        try { localStorage.setItem('adminKeyToken', data.keyToken); } catch (_) { }
                    }
                    // Verified: allow access to login page
                    showLoginUI();
                    return;
                }

                adminKeyInputEl.value = '';
                showAdminKeyError('Invalid Subscriber ID.');
            } catch (e) {
                console.error('Admin key verification failed:', e);
                showAdminKeyError('Could not verify Subscriber ID. Please try again.');
            } finally {
                adminKeyUnlockBtn.disabled = false;
                adminKeyUnlockBtn.textContent = 'Unlock';
            }
        }

        async function enforceAdminKeyGateForLogin() {
            try {
                // Check if the server session already has admin-key verified (for local sessions)
                const res = await fetch('/api/settings/check-admin-key-verified', { credentials: 'include' });
                const data = await res.json().catch(() => ({}));
                if (data && data.verified) {
                    showLoginUI();
                    return;
                }
            } catch (e) {
                console.error('check-admin-key-verified failed:', e);
                // fallthrough to showing overlay
            }

            // Not verified -> show the overlay gate which will call /api/settings/verify-entry-key
            showAdminKeyOverlay();
        }

        if (adminKeyUnlockBtn) adminKeyUnlockBtn.addEventListener('click', verifyAdminEntryKeyFromOverlay);
        if (adminKeyCancelBtn) adminKeyCancelBtn.addEventListener('click', () => window.location.href = '/');
        if (adminKeyInputEl) adminKeyInputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyAdminEntryKeyFromOverlay();
        });

        if (adminKeyToggleBtn && adminKeyInputEl) {
            adminKeyToggleBtn.addEventListener('click', () => {
                const isPassword = adminKeyInputEl.getAttribute('type') === 'password';
                adminKeyInputEl.setAttribute('type', isPassword ? 'text' : 'password');
                adminKeyToggleBtn.setAttribute('aria-label', isPassword ? 'Hide subscriber ID' : 'Show subscriber ID');
                adminKeyToggleBtn.title = isPassword ? 'Hide' : 'Show';

                // Swap icon (eye vs eye-off)
                if (!adminKeyToggleIcon) return;
                if (isPassword) {
                    adminKeyToggleIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                } else {
                    adminKeyToggleIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                }
            });
        }

        // Start the gate immediately
        enforceAdminKeyGateForLogin();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const errorMessage = document.getElementById('errorMessage');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const forgotPasswordContainer = document.getElementById('forgotPasswordContainer');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const backToLoginLink = document.getElementById('backToLoginLink');
        const resetEmail = document.getElementById('resetEmail');
        const resetBtn = document.getElementById('resetBtn');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                const keyToken = localStorage.getItem('adminKeyToken');
                const loginPayload = { username, password };
                if (keyToken) loginPayload.keyToken = keyToken;
                
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginPayload),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    // Persist JWT token for production requests
                    try { localStorage.setItem('authToken', data.token || ''); } catch (_) { }
                    // Clear any stored admin key token (no longer needed) and redirect
                    try { localStorage.removeItem('adminKeyToken'); } catch (_) {}
                    window.location.href = '/admin.html';
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred. Please try again.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Sign In</span>';
            }
        });

        // Handle Google login callback
        async function handleSignInResponse(response) {
            hideError();
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<span class="spinner" style="border-color: rgba(0,0,0,0.2); border-top-color: #333;"></span> Signing in...';

            try {
                const authResponse = await fetch('/auth/google', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ credential: response.credential }),
                    credentials: 'include'
                });

                const data = await authResponse.json();

                if (data.success) {
                    try { localStorage.setItem('authToken', data.token || ''); } catch (_) { }
                    window.location.href = '/admin.html';
                } else {
                    showError(data.error || 'Google login failed');
                    googleBtn.disabled = false;
                    googleBtn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Sign in with Google
                    `;
                }
            } catch (error) {
                console.error('Google login error:', error);
                showError('An error occurred. Please try again.');
                googleBtn.disabled = false;
                googleBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                `;
            }
        }

        // Initialize Google Sign-In once
        let googleSignInInitialized = false;

        function initGoogleSignIn() {
            if (googleSignInInitialized) return;
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) return;

            google.accounts.id.initialize({
                client_id: '338774598801-rmbjl0aprte0l23ja5u3t3fm222jkbq1.apps.googleusercontent.com',
                callback: handleSignInResponse,
                auto_select: false,
                cancel_on_tap_outside: false
            });
            googleSignInInitialized = true;
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGoogleSignIn);
        } else {
            initGoogleSignIn();
        }

        // Handle Google sign-in button click
        googleBtn.addEventListener('click', () => {
            hideError();
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
                showError('Google Sign-In is loading. Please wait and try again.');
                return;
            }
            initGoogleSignIn();
            google.accounts.id.prompt();
        });

        // Handle password toggle
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');

        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Update icon
            const icon = passwordToggle.querySelector('svg');
            if (type === 'password') {
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            } else {
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            }
        });

        // Handle forgot password link
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            hideError();
            loginForm.style.display = 'none';
            forgotPasswordForm.style.display = 'block';
            forgotPasswordContainer.style.display = 'none';
            resetEmail.focus();
        });

        // Handle back to login link
        backToLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            hideError();
            forgotPasswordForm.style.display = 'none';
            loginForm.style.display = 'flex';
            forgotPasswordContainer.style.display = 'block';
            document.getElementById('username').focus();
        });

        // Handle reset password form submission
        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = resetEmail.value.trim();

            if (!email) {
                showError('Please enter your email address');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/auth/forgot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email }),
                });

                const data = await response.json();

                if (data.success) {
                    showError('Password reset email sent. Check your inbox.');
                    resetEmail.value = '';
                } else {
                    showError(data.error || 'Failed to send reset email');
                }
            } catch (error) {
                console.error('Forgot password error:', error);
                showError('An error occurred. Please try again.');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Send Reset Email';
            }
        });

        // Focus on username field
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>

</html>
