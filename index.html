<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zedong254ke - Blog</title>
    <style>
        :root {
            --primary-color: #F4A191;
            --accent-color: #4A9B9B;
            --bg-color: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-dark: #2C3E50;
            --text-medium: #6C757D;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.15);
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header Styles */
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #F6B8A9 100%);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: white;
        }

        .logo img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 8px;
        }

        nav a:hover, nav a:focus-visible {
            background: rgba(255,255,255,0.2);
            outline: none;
        }

        .admin-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: var(--transition);
            margin-left: 16px;
        }

        .admin-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }

        .subscription-input {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 12px;
            transition: var(--transition);
            margin-left: 16px;
            width: 180px;
        }

        .subscription-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .subscription-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
        }

        .search-btn {
            background: white;
            color: var(--primary-color);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .search-btn:hover {
            background: rgba(255,255,255,0.9);
            transform: translateY(-2px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 15% auto;
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .modal-btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .modal-btn-primary:hover {
            background: #e64a19;
        }

        .modal-btn-secondary {
            background: var(--text-medium);
            color: white;
        }

        .modal-btn-secondary:hover {
            background: #5a6c7d;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-medium);
        }

        .close:hover {
            color: var(--text-dark);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            padding: 16px 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-bar span {
            font-weight: 600;
            color: var(--text-medium);
        }

        .filter-tag {
            padding: 6px 16px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            background: white;
            color: var(--text-dark);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            font-weight: 500;
        }

        .filter-tag:hover, .filter-tag.active {
            background: var(--primary-color);
            color: white;
        }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        /* Blog Card */
        .blog-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .blog-card:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        .card-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .card-meta {
            font-size: 14px;
            color: var(--text-medium);
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .reading-time {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-excerpt {
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 16px;
            line-height: 1.6;
            flex: 1;
        }

        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 16px;
            background: #FFF5F3;
            border: 1px solid var(--primary-color);
            color: var(--text-dark);
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
        }

        .tag:hover {
            background: #FFE8E3;
        }

        .read-more {
            color: var(--accent-color);
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
        }

        .read-more:hover {
            text-decoration: underline;
            gap: 8px;
        }

        /* Responsive Design */
        @media (max-width: 1023px) {
            .blog-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        @media (max-width: 767px) {
            .header-container {
                padding: 0 16px;
            }

            .logo h1 {
                font-size: 20px;
            }

            nav {
                gap: 16px;
            }

            nav a span {
                display: none;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }

            main {
                padding: 24px 16px;
            }

            .filter-bar {
                padding: 12px 16px;
            }
        }

        /* Loading & Empty States */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-medium);
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="#" class="logo">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=zedong" alt="Profile picture">
                <h1>zedong254ke</h1>
            </a>
            <nav>
                <a href="#"><span>Home</span>🏠</a>
                <a href="#"><span>Blog</span>📝</a>
                <a href="#"><span>About</span>ℹ️</a>
                <input type="email" class="subscription-input" placeholder="Subscribe to newsletter" id="subscriptionEmail">
                <button class="search-btn">🔍 Search</button>
                <button class="admin-btn" onclick="window.location.href='/admin.html'">Admin</button>
            </nav>
        </div>
    </header>

    <main>
        <div class="filter-bar">
            <span>Filter by:</span>
            <button class="filter-tag active">All</button>
            <button class="filter-tag">Web Development</button>
            <button class="filter-tag">JavaScript</button>
            <button class="filter-tag">Vue.js</button>
            <button class="filter-tag">Programming</button>
            <button class="filter-tag">Technology</button>
        </div>

        <div class="blog-grid" id="blog-grid">
            <!-- Posts will be loaded dynamically here -->
        </div>
    </main>

    <!-- Admin Entry Key Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-header">Admin Access</div>
            <div class="modal-body">
                <p>Please enter the admin entry key to access the admin panel.</p>
                <input type="password" id="adminKeyInput" class="modal-input" placeholder="Enter admin key" onkeypress="handleKeyPress(event)">
                <div id="errorMessage" style="color: #dc2626; font-size: 14px; margin-top: 8px; display: none;"></div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="modal-btn modal-btn-primary" onclick="verifyAdminKey()">Submit</button>
            </div>
        </div>
    </div>

    <script>
        let allPosts = [];
        let currentFilter = 'all';

        // Load posts from server
        async function loadPosts() {
            try {
                const response = await fetch('/api/posts');
                const data = await response.json();
                allPosts = data.posts || [];
                renderPosts();
            } catch (error) {
                console.error('Failed to load posts:', error);
                // Show empty state
                document.getElementById('blog-grid').innerHTML = '<div class="empty-state"><h3>No posts found</h3><p>Check back later for new content.</p></div>';
            }
        }

        // Render posts based on current filter
        function renderPosts() {
            const grid = document.getElementById('blog-grid');
            const filteredPosts = currentFilter === 'all'
                ? allPosts
                : allPosts.filter(post =>
                    post.tags && post.tags.some(tag =>
                        tag.toLowerCase().includes(currentFilter.toLowerCase())
                    )
                );

            if (filteredPosts.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No posts found</h3><p>Try adjusting your filter or check back later.</p></div>';
                return;
            }

            grid.innerHTML = filteredPosts.map(post => createPostCard(post)).join('');
            attachCardEventListeners();
        }

        // Create HTML for a single post card
        function createPostCard(post) {
            const date = new Date(post.date).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            const tags = post.tags && post.tags.length > 0
                ? post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')
                : '';

            const imageUrl = post.image || 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=500&fit=crop';

            // Calculate reading time (rough estimate: 200 words per minute)
            const wordCount = post.content ? post.content.split(/\s+/).length : 0;
            const readingTime = Math.max(1, Math.ceil(wordCount / 200));

            return `
                <article class="blog-card" tabindex="0" data-post-id="${post.id}">
                    <img src="${imageUrl}" alt="${post.title}" class="card-image">
                    <div class="card-content">
                        <h2 class="card-title">${post.title}</h2>
                        <div class="card-meta">
                            <span>${date} · ${post.author || 'Admin'}</span>
                            <span class="reading-time">📖 ${readingTime} min read</span>
                        </div>
                        <p class="card-excerpt">${post.content ? post.content.substring(0, 150) + '...' : ''}</p>
                        <div class="card-tags">
                            ${tags}
                        </div>
                        <a href="#" class="read-more">Read more →</a>
                    </div>
                </article>
            `;
        }

        // Attach event listeners to dynamically created cards
        function attachCardEventListeners() {
            const blogCards = document.querySelectorAll('.blog-card');

            blogCards.forEach(card => {
                // Make entire card clickable
                card.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('tag')) {
                        const link = card.querySelector('.read-more');
                        if (link) {
                            // For now, just prevent default - could link to full post view
                            e.preventDefault();
                            console.log('Read more clicked for post:', card.dataset.postId);
                        }
                    }
                });

                // Keyboard support
                card.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const link = card.querySelector('.read-more');
                        if (link) {
                            e.preventDefault();
                            console.log('Read more clicked for post:', card.dataset.postId);
                        }
                    }
                });
            });
        }

        // Filter functionality
        const filterTags = document.querySelectorAll('.filter-tag');

        filterTags.forEach(tag => {
            tag.addEventListener('click', () => {
                // Remove active class from all tags
                filterTags.forEach(t => t.classList.remove('active'));
                // Add active class to clicked tag
                tag.classList.add('active');

                currentFilter = tag.textContent.toLowerCase();
                renderPosts();
            });
        });

        // Search button (placeholder)
        document.querySelector('.search-btn').addEventListener('click', () => {
            alert('Search functionality - Connect to your search implementation');
        });

        // Newsletter subscription
        const subscriptionInput = document.getElementById('subscriptionEmail');
        subscriptionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                subscribeToNewsletter();
            }
        });

        async function subscribeToNewsletter() {
            const email = subscriptionInput.value.trim();
            if (!email) {
                alert('Please enter your email address');
                return;
            }

            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }

            try {
                const response = await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Thank you for subscribing!');
                    subscriptionInput.value = '';
                } else {
                    alert(result.error || 'Subscription failed. Please try again.');
                }
            } catch (error) {
                console.error('Subscription error:', error);
                alert('An error occurred. Please try again.');
            }
        }

        // Admin Modal Functions
        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'block';
            document.getElementById('adminKeyInput').focus();
        }

        function closeModal() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('adminKeyInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                verifyAdminKey();
            } else if (event.key === 'Escape') {
                closeModal();
            }
        }

        async function verifyAdminKey() {
            const key = document.getElementById('adminKeyInput').value.trim();
            if (!key) {
                showError('Please enter the admin key');
                return;
            }

            try {
                const response = await fetch('/api/settings/verify-entry-key', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ adminEntryKey: key })
                });

                const result = await response.json();

                if (result.success) {
                    // Redirect to admin panel or show success
                    window.location.href = '/admin.html'; // Adjust path as needed
                } else {
                    showError('Invalid admin key. Please try again.');
                }
            } catch (error) {
                console.error('Error verifying admin key:', error);
                showError('An error occurred. Please try again.');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('adminModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Add admin access trigger (you can call openAdminModal() from any element)
        // Example: Add a hidden admin link or keyboard shortcut
        document.addEventListener('keydown', function(event) {
            // Press Ctrl+Shift+A to open admin modal
            if (event.ctrlKey && event.shiftKey && event.key === 'A') {
                event.preventDefault();
                openAdminModal();
            }
        });

        // Load posts when page loads
        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
