<!doctype html>
<!-- accessibility-fix: issue-148 - Missing lang attribute -->
<html lang="en">
<!-- /accessibility-fix -->
<head>
  <meta charset="utf-8">
  <title>Reset Password</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:2rem}</style>
</head>
<body>
  <h1>Reset Password</h1>
  <div id="msg"></div>
  <form id="resetForm">
    <!-- accessibility-fix: issue-150 - Improve label association -->
    <label for="pw">New password</label><br>
    <input type="password" id="pw" aria-required="true">
    <!-- /accessibility-fix --><br><br>
    <button type="submit">Reset Password</button>
  </form>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) document.getElementById('msg').innerText = 'Missing token';

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const resp = await fetch('/auth/reset', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ token, password: pw }) });
      const data = await resp.json();
      if (data.success) {
        document.getElementById('msg').innerText = 'Password reset. You may now login.';
        document.getElementById('resetForm').style.display = 'none';
      } else {
        document.getElementById('msg').innerText = data.error || 'Failed';
      }
    });
  </script>
</body>
</html>
