name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Install Vercel CLI
      run: npm i -g vercel

    - name: Deploy to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      run: |
        if [ -z "${VERCEL_TOKEN}" ]; then
          echo "ERROR: VERCEL_TOKEN secret is not set. Add it at Settings → Secrets → Actions and try again.";
          exit 1;
        fi
        # Deploy using vercel.json (serverless Node) and force production
        vercel --prod --token "${VERCEL_TOKEN}" --confirm
