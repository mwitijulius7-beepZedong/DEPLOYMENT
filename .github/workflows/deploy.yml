name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        npm ci

    - name: Build (if script exists)
      run: |
        if npm run | grep -q " build"; then
          npm run build
        else
          echo "No build script found — skipping build step"
        fi

    - name: Determine publish directory
      id: publish_dir
      run: |
        if [ -d "./public" ]; then echo "publish_dir=public" >> $GITHUB_OUTPUT; 
        elif [ -d "./dist" ]; then echo "publish_dir=dist" >> $GITHUB_OUTPUT; 
        else echo "publish_dir=none" >> $GITHUB_OUTPUT; fi

    - name: Fail if no static output
      if: ${{ steps.publish_dir.outputs.publish_dir == 'none' }}
      run: |
        echo "No static output directory found (public/ or dist/). This repo appears to be a server app and cannot be deployed to GitHub Pages as-is."; exit 1

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ${{ steps.publish_dir.outputs.publish_dir }}
